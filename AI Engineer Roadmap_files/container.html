        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        -webkit-touch-callout: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }

      html,
      body {
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
        font-family: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji',
          'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
        font-size: 16px;
        font-weight: 400;
        line-height: 133%;
        letter-spacing: 0.5px;
        -webkit-font-smoothing: subpixel-antialiased;
        -webkit-backface-visibility: hidden;
        -webkit-text-size-adjust: 100%;
        text-rendering: optimizeLegibility;
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        margin: 1px 0 0 0;
      }

      a,
      div,
      img,
      p {
        text-decoration: none;
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 100%;
        vertical-align: baseline;
      }

      div {
        display: block;
        position: relative;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }

      /* Banner styles - Desktop default */
      .promo-banner {
        z-index: 50;
        display: flex;
        background-color: white;
        box-shadow: 0 0 7px rgba(0, 0, 0, 0.1);
        outline: 0;
        bottom: 15px;
        left: auto;
        right: 15px;
        max-width: 350px;
        cursor: pointer;
      }

      /* Close button - Desktop default */
      .close-button {
        position: absolute;
        right: 6px;
        top: 6px;
        color: #d1d5db;
        cursor: pointer;
      }

      .close-button:hover {
        color: #1f2937;
      }

      /* Banner image - Desktop default */
      .banner-image {
        display: block;
        height: 153px;
        width: 118.18px;
        object-fit: cover;
      }

      /* Content container - Desktop default */
      .content-container {
        display: flex;
        flex: 1;
        flex-direction: column;
        justify-content: space-between;
        font-size: 0.875rem;
      }

      /* Text content */
      .text-content {
        padding: 10px;
      }

      .banner-title {
        display: block;
        margin-bottom: 2px;
        font-weight: 600;
        color: black;
      }

      .banner-description {
        display: block;
        color: #6b7280;
      }

      /* Footer - Desktop default */
      .sponsor-footer-mobile {
        display: none;
      }

      .sponsor-footer-desktop {
        display: block;
        text-align: center;
        font-weight: 600;
        font-size: 9px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 3px 10px;
        background: repeating-linear-gradient(
            -45deg,
            transparent,
            transparent 5px,
            hsla(0, 0%, 0%, 0.025) 5px,
            hsla(0, 0%, 0%, 0.025) 10px
          )
          #f1f3f466;
        color: black;
      }

      /* SVG icon - Desktop default */
      .close-icon {
        width: 16px;
        height: 16px;
      }

      .breakpoint-sm.promo-banner {
        max-width: 100%;
      }

      .breakpoint-sm .banner-image {
        height: 106px;
        width: auto;
      }

      .breakpoint-sm .content-container {
        font-size: 12px;
        line-height: 1.2;
      }

      .breakpoint-sm .sponsor-footer-desktop {
        display: none;
      }

      .breakpoint-sm .sponsor-footer-mobile {
        display: block;
        text-align: center;
        font-size: 10px;
        text-transform: uppercase;
        padding-bottom: 10px;
      }

      .breakpoint-sm .banner-description {
        display: block;
        display: -webkit-box;
        height: 50px;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }

.close-button {
